<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balad'Evasion - Quelque chose se prépare</title>
    <style>
        :root {
            --bg-color: #fdfcf8;
            --container-bg: rgba(255, 255, 255, 0.4);
            --text-main: #2d4a4a;
            --accent: #4fd1c5; /* Alignement sur le turquoise */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a2421;
                --container-bg: rgba(0, 0, 0, 0.3);
                --text-main: #e0ece4;
                --accent: #4fd1c5;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(79, 209, 197, 0.1) 0%, transparent 80%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem 2rem;
            border-radius: 40px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            max-width: 550px;
            width: 85%;
            text-align: center;
        }

        .logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .tictac {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 1rem;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(0.98); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .highlight {
            font-weight: bold;
            color: var(--accent);
        }

        /* Style du bouton */
        .btn-container {
            margin: 2rem 0;
        }

        .btn-balade {
            background-color: #4fd1c5;
            color: #1a202c;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            display: inline-block;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(79, 209, 197, 0.3);
        }

        .btn-balade:hover {
            transform: scale(1.05);
            background-color: #38b2ac;
        }

        .spam-text {
            color: var(--text-main);
            font-size: 0.8rem;
            margin-top: 10px;
            display: block;
            opacity: 0.6;
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.6;
        }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="ce782c8b-e24e-4b95-b302-8ef76986f286"></script>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Balad'Evasion" class="logo">
        
        <div class="tictac">Tic Tac...</div>
        
        <h1>Quelque chose se prépare !</h1>
        
        <p>
            Seul on est bien, à plusieurs c'est mieux. <br>
            Le réseau pour organiser vos sorties <span class="highlight">Moto, Vélo, Rando</span> arrive en juin.
        </p>

        <div class="btn-container">
            <a href="https://forms.gle/CoDeq6YtZCmC72MK7" class="btn-balade">
                🚀 Rejoindre l'aventure
            </a>
            <span class="spam-text">Juste une alerte pour l'ouverture. 📩</span>
        </div>

        <div class="footer">Évasion & Nature — Bientôt disponible</div>
    </div>
</body>
</html>
